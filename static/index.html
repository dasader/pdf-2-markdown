<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pdf2md — PDF를 마크다운으로</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h1>PDF를 마크다운으로</h1>
        <p class="sub">표와 문단 구조를 그대로 살려 옮깁니다.</p>
      </div>
      <button class="admin" id="admin">전체 보기</button>
    </div>

    <div class="drop" id="drop">
      <input type="file" id="file" accept="application/pdf" multiple hidden>
      <div class="glyph" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M8 8l4-4 4 4"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
      </div>
      <p>PDF를 여기에 놓으세요. 또는 <button class="pick" id="pick" type="button">파일 선택</button></p>
      <div class="opts">
        <label><input type="checkbox" id="opt-img" checked><span class="box"><svg viewBox="0 0 12 12"><path d="M2 6l2.6 2.6L10 3"/></svg></span>이미지 포함</label>
        <label><input type="checkbox" id="opt-csv" checked><span class="box"><svg viewBox="0 0 12 12"><path d="M2 6l2.6 2.6L10 3"/></svg></span>표를 CSV로</label>
      </div>
    </div>

    <div class="q-head">
      <span class="eyebrow">변환 대기열</span>
      <div class="q-right">
        <button class="downall hide" id="downall" type="button">완료분 전체 내려받기</button>
      </div>
    </div>

    <div class="beat hide" id="beat">
      <span class="dot"></span><span>다른 변환을 처리하는 중입니다. 곧 순서가 됩니다.</span>
    </div>

    <div class="queue" id="queue"></div>
  </div>

  <div class="modal" id="modal">
    <div class="sheet" role="dialog" aria-modal="true" aria-label="변환 결과 미리보기">
      <div class="sheet-head">
        <span class="fn" id="modal-fn"></span>
        <button class="x" id="close" aria-label="닫기" type="button">×</button>
      </div>
      <div class="md" id="md"></div>
    </div>
  </div>

  <script src="/static/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
