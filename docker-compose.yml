services:
  web:
    build: .
    image: pdf2md:latest          # web·worker 동일 이미지 1벌만 빌드(저디스크)
    ports:                        # command 없음 → Dockerfile의 CMD(uvicorn) 사용
      - "${PDF2MD_PORT:-8001}:8001"
    volumes:
      - ./data:/data
    environment:
      PDF2MD_ADMIN_KEY: "${PDF2MD_ADMIN_KEY:-}"
      PDF2MD_SEC_PER_PAGE: "${PDF2MD_SEC_PER_PAGE:-1.5}"
    mem_limit: 2g
    restart: unless-stopped

  worker:
    build: .
    image: pdf2md:latest          # web와 같은 이미지 재사용
    command: python -m app.worker
    volumes:
      - ./data:/data
    # 실측 peak: 11p 2.0GB / 51p 2.6GB / 178p·표87개 3.9GB(그림 크롭 포함).
    # 3g면 178p 보고서가 OOM으로 죽는다. 한 페이지에 이미지 객체가 수십만 개인
    # 병리적 문서는 6.1GB를 써 5g로도 못 살린다 — worker가 재시도 없이 실패시킨다.
    mem_limit: 5g
    restart: unless-stopped
